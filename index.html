<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Comisiones — Animal Center</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  /* ── TOKENS ── */
  :root {
    --bg:        #0f1117;
    --surface:   #181c27;
    --card:      #1e2333;
    --border:    #2a3049;
    --accent:    #4fd1c5;   /* teal clínico */
    --accent2:   #f6ad55;   /* ámbar para dinero */
    --muted:     #64748b;
    --text:      #e2e8f0;
    --text-soft: #94a3b8;
    --danger:    #fc8181;
    --success:   #68d391;

    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body:    'Inter', system-ui, sans-serif;
    --font-mono:    'JetBrains Mono', 'Courier New', monospace;
    --radius:       10px;
  }

  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 20px;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  .logo span { color: var(--text-soft); font-size: 13px; font-family: var(--font-body); font-weight: 400; margin-left: 10px; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .tab-btn {
    background: none; border: none; color: var(--muted);
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    padding: 12px 16px; cursor: pointer; position: relative;
    transition: color .15s;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-btn.active::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: var(--accent); border-radius: 2px 2px 0 0;
  }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* ── LAYOUT ── */
  .main { padding: 24px; max-width: 960px; margin: 0 auto; }
  .view { display: none; }
  .view.active { display: block; }

  /* ── CARDS ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-family: var(--font-display);
    font-size: 17px;
    color: var(--text);
    margin-bottom: 16px;
  }

  /* ── FORM ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-grid.full   { grid-template-columns: 1fr; }
  @media (max-width: 600px) {
    .form-grid, .form-grid.cols-3 { grid-template-columns: 1fr; }
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--text-soft);
    margin-bottom: 5px;
  }
  input, select, textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 8px 10px;
    outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface); }
  textarea { resize: vertical; min-height: 60px; }

  /* ── ITEMS TABLE (dentro del formulario) ── */
  .items-header {
    display: grid;
    grid-template-columns: 2fr 1.2fr 1fr 100px 36px;
    gap: 8px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--muted);
    padding: 0 0 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .item-row {
    display: grid;
    grid-template-columns: 2fr 1.2fr 1fr 100px 36px;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  @media (max-width: 600px) {
    .items-header { display: none; }
    .item-row { grid-template-columns: 1fr 1fr; gap: 6px; }
    .item-row .item-desc { grid-column: 1 / -1; }
    .item-row .item-del  { grid-column: 2; justify-self: end; }
  }

  .cat-badge {
    display: inline-block;
    padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    color: var(--accent);
  }
  .pct-label {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent2);
  }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px;
    border: none; border-radius: 6px; cursor: pointer;
    font-family: var(--font-body); font-weight: 500; font-size: 13px;
    padding: 8px 16px; transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.98); }
  .btn-primary   { background: var(--accent);  color: #0f1117; }
  .btn-secondary { background: var(--border);  color: var(--text); }
  .btn-ghost     { background: transparent;    color: var(--text-soft); border: 1px solid var(--border); }
  .btn-danger    { background: color-mix(in srgb, var(--danger) 20%, transparent); color: var(--danger); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn:hover { opacity: .85; }
  .btn-icon { width: 32px; height: 32px; padding: 0; background: var(--border); color: var(--text-soft); }
  .btn-icon:hover { color: var(--danger); background: color-mix(in srgb, var(--danger) 20%, transparent); }

  /* ── PREVIEW TOTALES ── */
  .totals-preview {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-top: 16px;
  }
  .totals-preview h4 {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .6px; color: var(--muted); margin-bottom: 10px;
  }
  .totals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 20px; }
  .total-line { display: flex; justify-content: space-between; font-size: 13px; }
  .total-line .tl-label { color: var(--text-soft); }
  .total-line .tl-val   { font-family: var(--font-mono); color: var(--accent2); font-size: 13px; }
  .total-grand {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
    font-weight: 600; font-size: 15px;
  }
  .total-grand .tl-val { color: var(--accent); font-family: var(--font-mono); font-size: 16px; }

  /* ── LISTA DE REGISTROS ── */
  .entry-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: border-color .15s;
    position: relative;
  }
  .entry-card:hover { border-color: var(--accent); }
  .entry-header {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .entry-meta { display: flex; flex-direction: column; gap: 2px; }
  .entry-patient { font-size: 15px; font-weight: 600; color: var(--text); }
  .entry-owner   { font-size: 12px; color: var(--text-soft); }
  .entry-fact    {
    font-family: var(--font-mono); font-size: 11px;
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    color: var(--accent); padding: 2px 8px; border-radius: 4px; white-space: nowrap;
  }
  .entry-total-badge {
    font-family: var(--font-mono); font-size: 16px;
    font-weight: 600; color: var(--accent2);
    white-space: nowrap;
  }
  .entry-items-preview {
    margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px;
  }
  .entry-actions {
    display: flex; gap: 6px; margin-top: 12px;
  }

  /* ── RESUMEN MENSUAL ── */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .6px; color: var(--muted); margin-bottom: 6px;
  }
  .stat-val {
    font-family: var(--font-mono); font-size: 20px; font-weight: 600;
    color: var(--accent2);
  }
  .stat-val.accent { color: var(--accent); }
  .stat-val.small  { font-size: 15px; }

  .breakdown-table {
    width: 100%; border-collapse: collapse;
  }
  .breakdown-table th {
    text-align: left; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .6px;
    color: var(--muted); padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .breakdown-table td {
    padding: 9px 10px; font-size: 13px; border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
  }
  .breakdown-table tr:last-child td { border-bottom: none; }
  .breakdown-table td:last-child { font-family: var(--font-mono); color: var(--accent2); text-align: right; }
  .breakdown-table td:nth-child(3) { color: var(--text-soft); font-size: 12px; text-align: right; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center; padding: 48px 24px; color: var(--muted);
  }
  .empty svg { opacity: .3; margin-bottom: 12px; }
  .empty p { font-size: 15px; margin-bottom: 8px; color: var(--text-soft); }
  .empty small { font-size: 12px; }

  /* ── MONTH SELECTOR ── */
  .month-bar {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .month-bar label { margin: 0; font-size: 12px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }
  .month-bar input[type=month] { width: auto; max-width: 180px; }

  /* ── MODAL ── */
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.65); z-index: 200;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%; max-width: 640px;
    max-height: 90vh; overflow-y: auto;
    padding: 24px;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-header h2 { font-family: var(--font-display); font-size: 20px; }

  /* ── CHIP FILTER ── */
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip {
    padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); background: transparent; color: var(--text-soft);
    cursor: pointer; transition: all .15s;
  }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #0f1117; }
  .chip:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  /* ── MISC ── */
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .row-between { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .text-muted { color: var(--muted); font-size: 12px; }
  .mt-8  { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .badge-cx { background: color-mix(in srgb, #f6ad55 15%, transparent); color: #f6ad55; }
  .scrollable-x { overflow-x: auto; }

  /* ── SYNC STATUS ── */
  .sync-bar {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 16px; margin-bottom: 16px;
    font-size: 13px;
  }
  .sync-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .sync-dot.ok      { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .sync-dot.error   { background: var(--danger); }
  .sync-dot.pending { background: var(--accent2); animation: pulse .8s infinite alternate; }
  .sync-dot.off     { background: var(--muted); }
  @keyframes pulse { from { opacity:.4 } to { opacity:1 } }
  .sync-msg { color: var(--text-soft); flex: 1; }
  .sync-time { color: var(--muted); font-size: 11px; font-family: var(--font-mono); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 20px;
    font-size: 13px; color: var(--text);
    transition: transform .3s ease; z-index: 300; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* Print */
  @media print {
    header, .tabs, .month-bar .btn, .entry-actions { display: none !important; }
    body { background: white; color: #111; }
    .card, .entry-card, .stat-box { border-color: #ccc; background: white; }
    .stat-val, .entry-total-badge, .tl-val, .breakdown-table td:last-child { color: #111 !important; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Animal Center <span>— Comisiones Médico</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="doctorName" style="font-size:13px; color:var(--text-soft)"></div>
    <button class="btn btn-ghost btn-sm" onclick="syncNow()" id="sync-btn" title="Sincronizar con Google Sheets">↕️ Sync</button>
  </div>
</header>

<div id="toast"></div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('registro')">➕ Nuevo registro</button>
  <button class="tab-btn" onclick="switchTab('listado')">📋 Registros</button>
  <button class="tab-btn" onclick="switchTab('resumen')">📊 Resumen mensual</button>

</div>

<div class="main">

  <!-- ════════════════ TAB: REGISTRO ════════════════ -->
  <div id="view-registro" class="view active">
    <div class="card">
      <div class="card-title">Datos del paciente</div>
      <div class="form-grid cols-3">
        <div>
          <label>Nombre del paciente</label>
          <input type="text" id="inp-patient" placeholder="Ej: Mimi" />
        </div>
        <div>
          <label>Propietario</label>
          <input type="text" id="inp-owner" placeholder="Ej: Sharoom García" />
        </div>
        <div>
          <label>N° Factura</label>
          <input type="text" id="inp-fact" placeholder="Ej: 53527" />
        </div>
      </div>
      <div class="form-grid mt-8">
        <div>
          <label>Fecha</label>
          <input type="date" id="inp-date" />
        </div>
        <div>
          <label>Notas (opcional)</label>
          <input type="text" id="inp-notes" placeholder="Observaciones" />
        </div>
      </div>
    </div>

    <div class="card">
      <div class="row-between" style="margin-bottom:14px">
        <div class="card-title" style="margin:0">Servicios y productos</div>
        <button class="btn btn-primary btn-sm" onclick="addItem()">+ Agregar ítem</button>
      </div>

      <div class="items-header">
        <span>Descripción</span>
        <span>Categoría</span>
        <span>Valor</span>
        <span>% / Comisión</span>
        <span></span>
      </div>

      <div id="items-container"></div>

      <div class="row-between mt-16">
        <button class="btn btn-ghost btn-sm" onclick="addItem()">+ Añadir otro ítem</button>
        <span id="items-count" class="text-muted">0 ítems</span>
      </div>

      <div id="totals-preview" class="totals-preview" style="display:none">
        <h4>Vista previa de comisiones</h4>
        <div class="totals-grid" id="totals-grid"></div>
        <div class="total-grand">
          <span>Total comisión médico</span>
          <span class="tl-val" id="grand-total">$0</span>
        </div>
      </div>
    </div>

    <div class="row-between">
      <button class="btn btn-secondary" onclick="clearForm()">Limpiar formulario</button>
      <button class="btn btn-primary" onclick="saveEntry()">💾 Guardar registro</button>
    </div>
  </div>

  <!-- ════════════════ TAB: LISTADO ════════════════ -->
  <div id="view-listado" class="view">
    <div id="sync-bar" class="sync-bar">
      <span class="sync-dot off" id="sync-dot"></span>
      <span class="sync-msg" id="sync-msg">Sin sincronizar — configura la URL del Apps Script en ⚙️ Config</span>
      <span class="sync-time" id="sync-time"></span>
      <button class="btn btn-ghost btn-sm" onclick="syncNow()">↕️ Sincronizar</button>
      <button class="btn btn-ghost btn-sm" onclick="loadFromSheets()">⬇️ Cargar</button>
    </div>
    <div class="month-bar">
      <label>Mes</label>
      <input type="month" id="filter-month-list" onchange="renderList()" />
      <button class="btn btn-ghost btn-sm" onclick="clearMonthFilter()">Ver todos</button>
    </div>
    <div class="filter-row" id="filter-chips">
      <span class="chip active" data-filter="all" onclick="setFilter('all',this)">Todos</span>
    </div>
    <div id="entries-list"></div>
  </div>

  <!-- ════════════════ TAB: RESUMEN ════════════════ -->
  <div id="view-resumen" class="view">
    <div class="month-bar">
      <label>Mes</label>
      <input type="month" id="filter-month-summary" onchange="renderSummary()" />
    </div>
    <div id="summary-content"></div>
  </div>

            <div class="mt-16">
        <button class="btn btn-primary btn-sm" onclick="saveConfig()">Guardar</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Porcentajes de comisión</div>
      <div id="pct-grid" class="form-grid"></div>
      <div class="mt-16 row-between">
        <button class="btn btn-primary btn-sm" onclick="savePcts()">Guardar porcentajes</button>
        <button class="btn btn-ghost btn-sm" onclick="resetPcts()">Restablecer predeterminados</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title" style="color:var(--danger)">Zona peligrosa</div>
      <button class="btn btn-danger btn-sm" onclick="clearAllData()">🗑️ Borrar todos los datos</button>
    </div>
  </div>

</div><!-- /main -->

<!-- ════════ MODAL DETALLE ════════ -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <div class="modal-header">
      <h2 id="modal-title">Detalle</h2>
      <button class="btn btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   ESTADO Y CONSTANTES
══════════════════════════════════════════════ */
const CATEGORIES = [
  { id:'servicios',      label:'Servicios',       pct:30 },
  { id:'cirugia',        label:'Cirugía',          pct:30 },
  { id:'hospitalizacion',label:'Hospitalización',  pct:20 },
  { id:'urocultivo',     label:'Urocultivo',        pct:20 },
  { id:'pcr',            label:'PCR',               pct:10 },
  { id:'medicacion',     label:'Medicación',        pct:20 },
  { id:'inyectologia',   label:'Inyectología',      pct:20 },
  { id:'productos',      label:'Productos',         pct:10 },
];

const CAT_COLORS = {
  servicios:      '#4fd1c5',
  cirugia:        '#f6ad55',
  hospitalizacion:'#b794f4',
  urocultivo:     '#63b3ed',
  pcr:            '#fc8181',
  medicacion:     '#68d391',
  inyectologia:   '#faf089',
  productos:      '#a0aec0',
};

let entries  = JSON.parse(localStorage.getItem('ac_entries')  || '[]');
let config   = JSON.parse(localStorage.getItem('ac_config')   || '{}');
let pcts     = JSON.parse(localStorage.getItem('ac_pcts')     || 'null');

// ── Configuración fija ──
config.appsScriptUrl = 'https://script.google.com/macros/s/AKfycbxxGlG0RzuUnhF6jBtsstGQSCtEvIK4QvRA6vdPNLcGKM3usQr1fQI4p3nXVELClLPx/exec';
localStorage.setItem('ac_config', JSON.stringify(config));
let itemRows = [];
let filterCat = 'all';

if (!pcts) pcts = Object.fromEntries(CATEGORIES.map(c => [c.id, c.pct]));

/* ══════════════════════════════════════════════
   TABS
══════════════════════════════════════════════ */
function switchTab(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'listado')  renderList();
  if (name === 'resumen')  renderSummary();
}

/* ══════════════════════════════════════════════
   ITEMS (formulario)
══════════════════════════════════════════════ */
function addItem(desc='', cat='servicios', val='') {
  const id = Date.now() + Math.random();
  itemRows.push(id);
  const cont = document.getElementById('items-container');
  const row = document.createElement('div');
  row.className = 'item-row';
  row.dataset.id = id;

  const catOpts = CATEGORIES.map(c =>
    `<option value="${c.id}" ${c.id===cat?'selected':''}>${c.label}</option>`
  ).join('');

  const pct = pcts[cat] || 0;

  row.innerHTML = `
    <div class="item-desc">
      <input type="text" placeholder="Descripción" value="${desc}"
             onchange="updateRow('${id}')" oninput="updateRow('${id}')" />
    </div>
    <div>
      <select onchange="onCatChange('${id}',this)">
        ${catOpts}
      </select>
    </div>
    <div>
      <input type="number" min="0" step="1000" placeholder="0" value="${val}"
             onchange="calcTotals()" oninput="calcTotals()" />
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="pct-label" id="pct-${id}">${pct}%</span>
      <span style="color:var(--text-soft);font-family:var(--font-mono);font-size:12px" id="com-${id}">$0</span>
    </div>
    <button class="btn btn-icon" onclick="removeItem('${id}')">✕</button>
  `;
  cont.appendChild(row);
  calcTotals();
}

function onCatChange(id, sel) {
  const pct = pcts[sel.value] || 0;
  document.getElementById('pct-' + id).textContent = pct + '%';
  calcTotals();
}

function updateRow(id) { calcTotals(); }

function removeItem(id) {
  const row = document.querySelector(`.item-row[data-id="${id}"]`);
  if (row) row.remove();
  itemRows = itemRows.filter(r => r != id);
  calcTotals();
}

function getItemsData() {
  const rows = document.querySelectorAll('.item-row');
  return Array.from(rows).map(row => {
    const inputs = row.querySelectorAll('input');
    const sel    = row.querySelector('select');
    const desc   = inputs[0].value.trim();
    const val    = parseFloat(inputs[1].value) || 0;
    const cat    = sel.value;
    const pct    = pcts[cat] || 0;
    const com    = Math.round(val * pct / 100);
    return { desc, cat, val, pct, com };
  }).filter(r => r.desc || r.val);
}

function calcTotals() {
  const rows = document.querySelectorAll('.item-row');
  let catTotals = {};

  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const sel    = row.querySelector('select');
    const id     = row.dataset.id;
    const val    = parseFloat(inputs[1].value) || 0;
    const cat    = sel ? sel.value : 'servicios';
    const pct    = pcts[cat] || 0;
    const com    = Math.round(val * pct / 100);
    if (document.getElementById('com-' + id))
      document.getElementById('com-' + id).textContent = '$' + com.toLocaleString('es-CO');
    if (val > 0) catTotals[cat] = (catTotals[cat] || 0) + com;
  });

  const count = rows.length;
  document.getElementById('items-count').textContent = count + ' ítem' + (count !== 1 ? 's' : '');

  const previewEl = document.getElementById('totals-preview');
  const gridEl    = document.getElementById('totals-grid');
  const grandEl   = document.getElementById('grand-total');

  const totalCom = Object.values(catTotals).reduce((a,b) => a+b, 0);

  if (Object.keys(catTotals).length === 0) {
    previewEl.style.display = 'none'; return;
  }
  previewEl.style.display = 'block';

  gridEl.innerHTML = Object.entries(catTotals).map(([cat, com]) => {
    const catObj = CATEGORIES.find(c => c.id === cat);
    return `<div class="total-line">
      <span class="tl-label">${catObj ? catObj.label : cat} (${pcts[cat]}%)</span>
      <span class="tl-val">$${com.toLocaleString('es-CO')}</span>
    </div>`;
  }).join('');

  grandEl.textContent = '$' + totalCom.toLocaleString('es-CO');
}

/* ══════════════════════════════════════════════
   GUARDAR / LIMPIAR
══════════════════════════════════════════════ */
function saveEntry() {
  const patient = document.getElementById('inp-patient').value.trim();
  const owner   = document.getElementById('inp-owner').value.trim();
  const fact    = document.getElementById('inp-fact').value.trim();
  const date    = document.getElementById('inp-date').value;
  const notes   = document.getElementById('inp-notes').value.trim();

  if (!patient) { alert('Ingresa el nombre del paciente'); return; }
  if (!fact)    { alert('Ingresa el número de factura');   return; }

  const items = getItemsData();
  if (!items.length) { alert('Agrega al menos un ítem'); return; }

  const catTotals = {};
  items.forEach(it => {
    catTotals[it.cat] = (catTotals[it.cat] || 0) + it.com;
  });
  const totalCom = Object.values(catTotals).reduce((a,b)=>a+b,0);
  const totalVal = items.reduce((a,b)=>a+b.val, 0);

  const entry = {
    id: Date.now(),
    patient, owner, fact, date: date || todayStr(),
    notes, items, catTotals, totalCom, totalVal
  };

  entries.push(entry);
  save();
  clearForm();
  alert('✅ Registro guardado correctamente');
}

function clearForm() {
  ['inp-patient','inp-owner','inp-fact','inp-notes'].forEach(id =>
    document.getElementById(id).value = ''
  );
  document.getElementById('inp-date').value = todayStr();
  document.getElementById('items-container').innerHTML = '';
  itemRows = [];
  calcTotals();
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function renderList() {

  filtered = filtered.slice().reverse();

  // build chips
  const allCats = new Set(entries.flatMap(e => Object.keys(e.catTotals || {})));
  const chips = document.getElementById('filter-chips');
  chips.innerHTML = `<span class="chip ${filterCat==='all'?'active':''}" onclick="setFilter('all',this)">Todos</span>`;
  allCats.forEach(cat => {
    const obj = CATEGORIES.find(c=>c.id===cat);

  const cont = document.getElementById('entries-list');

    cont.innerHTML = `<div class="empty">

      <p>No hay registros</p>
      <small>${monthFilter ? 'para este mes' : 'aún'}</small>
    </div>`; return;
  }

  cont.innerHTML = filtered.map(e => {
    const itemBadges = e.items.slice(0,4).map(it =>
      `<span class="cat-badge" style="background:${CAT_COLORS[it.cat]}22;color:${CAT_COLORS[it.cat]}">${it.desc || it.cat}</span>`
    ).join('') + (e.items.length > 4 ? `<span class="text-muted">+${e.items.length-4} más</span>` : '');

    return `<div class="entry-card" onclick="openDetail(${e.id})">
      <div class="entry-header">
        <div class="entry-meta">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="entry-patient">${e.patient}</span>
            <span class="entry-fact">Fact. ${e.fact}</span>
          </div>
          <span class="entry-owner">${e.owner} · ${fmtDate(e.date)}</span>
        </div>
        <span class="entry-total-badge">$${e.totalCom.toLocaleString('es-CO')}</span>
      </div>
      <div class="entry-items-preview">${itemBadges}</div>
      <div class="entry-actions" onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-sm" onclick="openDetail(${e.id})">Ver detalle</button>
        <button class="btn btn-danger btn-sm" onclick="deleteEntry(${e.id})">Eliminar</button>
      </div>

  }).join('');
}

   RESUMEN MENSUAL
══════════════════════════════════════════════ */
function renderSummary() {
  const mf = document.getElementById('filter-month-summary').value;
  let data = entries;
  if (mf) data = data.filter(e => e.date && e.date.slice(0,7) === mf);

  const cont = document.getElementById('summary-content');
  if (!data.length) {
    cont.innerHTML = `<div class="empty"><p>Sin datos para el período seleccionado</p></div>`; return;
  }

  const totalCom  = data.reduce((a,e)=>a+e.totalCom,0);
  const totalVenta = data.reduce((a,e)=>a+e.totalVal,0);
  const nRegistros = data.length;

  // aggregate by category
  const catAgg = {};
  data.forEach(e => {
    Object.entries(e.catTotals || {}).forEach(([cat,com]) => {
      catAgg[cat] = (catAgg[cat] || {sumCom:0, sumVal:0, count:0});
      catAgg[cat].sumCom += com;
      catAgg[cat].count++;
    });
    e.items.forEach(it => {
      if (!catAgg[it.cat]) catAgg[it.cat] = {sumCom:0, sumVal:0, count:0};
      catAgg[it.cat].sumVal += it.val;
    });
  });

  const catRows = Object.entries(catAgg).sort((a,b)=>b[1].sumCom-a[1].sumCom).map(([cat,agg]) => {
    const obj = CATEGORIES.find(c=>c.id===cat);
    const color = CAT_COLORS[cat] || '#fff';
    return `<tr>
      <td><span class="cat-badge" style="background:${color}22;color:${color}">${obj?obj.label:cat}</span></td>
      <td style="font-family:var(--font-mono);text-align:right">$${agg.sumVal.toLocaleString('es-CO')}</td>
      <td style="text-align:right">${pcts[cat]}%</td>
      <td>$${agg.sumCom.toLocaleString('es-CO')}</td>
    </tr>`;
  }).join('');

  // per-patient
  const patMap = {};
  data.forEach(e => {
    const key = e.patient + '|' + e.owner;
    if (!patMap[key]) patMap[key] = { patient:e.patient, owner:e.owner, total:0, n:0 };
    patMap[key].total += e.totalCom;
    patMap[key].n++;
  });
  const patRows = Object.values(patMap).sort((a,b)=>b.total-a.total).map(p =>
    `<tr>
      <td>${p.patient}</td>
      <td style="color:var(--text-soft)">${p.owner}</td>
      <td style="text-align:right">${p.n}</td>
      <td>$${p.total.toLocaleString('es-CO')}</td>
    </tr>`
  ).join('');

  const mLabel = mf ? new Date(mf + '-15').toLocaleDateString('es-CO',{month:'long',year:'numeric'}) : 'Todos los registros';

  cont.innerHTML = `
    <div class="summary-bar">
      <div class="stat-box">
        <div class="stat-label">Total comisión</div>
        <div class="stat-val accent">$${totalCom.toLocaleString('es-CO')}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Venta total</div>
        <div class="stat-val">$${totalVenta.toLocaleString('es-CO')}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Registros</div>
        <div class="stat-val small" style="color:var(--text)">${nRegistros}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">% promedio</div>
        <div class="stat-val small" style="color:var(--text-soft)">${totalVenta ? Math.round(totalCom/totalVenta*100) : 0}%</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Comisión por categoría · ${mLabel}</div>
      <div class="scrollable-x">
      <table class="breakdown-table">
        <thead><tr>
          <th>Categoría</th>
          <th style="text-align:right">Venta</th>
          <th style="text-align:right">%</th>
          <th style="text-align:right">Comisión</th>
        </tr></thead>
        <tbody>${catRows}</tbody>
      </table>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Por paciente</div>
      <div class="scrollable-x">
      <table class="breakdown-table">
        <thead><tr>
          <th>Paciente</th>
          <th>Propietario</th>
          <th style="text-align:right">Consultas</th>
          <th style="text-align:right">Comisión</th>
        </tr></thead>
        <tbody>${patRows}</tbody>
      </table>
      </div>
    </div>

    <div style="text-align:right;margin-top:8px;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost btn-sm" onclick="exportExcel()">📥 Exportar Excel</button>
      <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨️ Imprimir / PDF</button>
    </div>
  `;
}

function getScriptUrl() { return 'https://script.google.com/macros/s/AKfycbxxGlG0RzuUnhF6jBtsstGQSCtEvIK4QvRA6vdPNLcGKM3usQr1fQI4p3nXVELClLPx/exec'; }

function setSyncStatus(state, msg, time) {
  const dot = document.getElementById('sync-dot');
  const msgEl = document.getElementById('sync-msg');
  const timeEl = document.getElementById('sync-time');
  if (!dot) return;
  dot.className = 'sync-dot ' + state;
  if (msgEl) msgEl.textContent = msg;
  if (timeEl && time) timeEl.textContent = time;
}

function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

async function syncNow() {
  const url = getScriptUrl();

  setSyncStatus('pending', 'Sincronizando…');
  const btn = document.getElementById('sync-btn');
  if (btn) btn.disabled = true;

  try {
    const resp = await fetch(url, {
      method: 'POST',
      body: JSON.stringify({ action: 'sync', entries }),
    });
    const data = await resp.json();
    if (data.ok) {
      const now = new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
      setSyncStatus('ok', `Sincronizado · ${entries.length} registros, ${data.rows} filas`, now);
      config.lastSync = now;
      localStorage.setItem('ac_config', JSON.stringify(config));
      showToast('✅ Sincronizado con Google Sheets');
    } else {
      setSyncStatus('error', 'Error: ' + (data.error || 'desconocido'));
      showToast('❌ Error al sincronizar');
    }
  } catch(e) {
    setSyncStatus('error', 'No se pudo conectar con el servidor');
    showToast('❌ Sin conexión con Apps Script');
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function loadFromSheets() {
  const url = getScriptUrl();
  if (!url) { showToast('⚠️ Configura la URL del Apps Script primero'); return; }

  setSyncStatus('pending', 'Cargando desde Google Sheets…');
  try {
    const resp = await fetch(url + '?action=getAll');
    const data = await resp.json();
    if (data.ok && data.entries) {
      // Merge: priorizar Sheets, conservar locales que no existan en Sheets
      const sheetsIds = new Set(data.entries.map(e => String(e.id)));
      const localOnly = entries.filter(e => !sheetsIds.has(String(e.id)));
      entries = [...data.entries, ...localOnly];
      save();
      renderList();
      const now = new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
      setSyncStatus('ok', `Cargado · ${entries.length} registros`, now);
      showToast(`✅ ${entries.length} registros cargados`);
    } else {
      setSyncStatus('error', 'Error al cargar: ' + (data.error || ''));
    }
  } catch(e) {
    setSyncStatus('error', 'No se pudo conectar');
    showToast('❌ Sin conexión con Apps Script');
  }
}

function exportExcel() {
  if (!entries.length) { showToast('No hay datos para exportar'); return; }

  const mf = document.getElementById('filter-month-summary').value;
  let data = entries;
  if (mf) data = data.filter(e => e.date && e.date.slice(0,7) === mf);

  const wb = XLSX.utils.book_new();

  // ── Hoja 1: Detalle completo ──
  const detRows = [['Fecha','Paciente','Propietario','Factura','Descripción','Categoría','Valor','% Comisión','Comisión ítem','Total comisión registro']];
  data.forEach(e => {
    e.items.forEach(it => {
      const catObj = CATEGORIES.find(c => c.id === it.cat);
      detRows.push([
        e.date, e.patient, e.owner, e.fact,
        it.desc, catObj ? catObj.label : it.cat,
        it.val, it.pct, it.com, e.totalCom
      ]);
    });
  });
  const ws1 = XLSX.utils.aoa_to_sheet(detRows);
  ws1['!cols'] = [10,20,20,12,25,18,12,10,12,18].map(w => ({ wch: w }));
  XLSX.utils.book_append_sheet(wb, ws1, 'Detalle');

  // ── Hoja 2: Resumen por registro ──
  const resRows = [['Fecha','Paciente','Propietario','Factura','Notas','Venta Total','Comisión Total']];
  data.forEach(e => {
    resRows.push([e.date, e.patient, e.owner, e.fact, e.notes||'', e.totalVal, e.totalCom]);
  });
  resRows.push(['','','','','','TOTAL', data.reduce((a,e)=>a+e.totalCom,0)]);
  const ws2 = XLSX.utils.aoa_to_sheet(resRows);
  ws2['!cols'] = [12,20,20,12,20,14,14].map(w => ({ wch: w }));
  XLSX.utils.book_append_sheet(wb, ws2, 'Resumen por registro');

  // ── Hoja 3: Resumen por categoría ──
  const catAgg = {};
  data.forEach(e => {
    e.items.forEach(it => {
      if (!catAgg[it.cat]) catAgg[it.cat] = { sumVal: 0, sumCom: 0 };
      catAgg[it.cat].sumVal += it.val;
      catAgg[it.cat].sumCom += it.com;
    });
  });
  const catRows2 = [['Categoría','% Comisión','Venta Total','Comisión Total']];
  Object.entries(catAgg).sort((a,b)=>b[1].sumCom-a[1].sumCom).forEach(([cat, agg]) => {
    const obj = CATEGORIES.find(c=>c.id===cat);
    catRows2.push([obj?obj.label:cat, (pcts[cat]||0)+'%', agg.sumVal, agg.sumCom]);
  });
  catRows2.push(['TOTAL','',
    Object.values(catAgg).reduce((a,b)=>a+b.sumVal,0),
    Object.values(catAgg).reduce((a,b)=>a+b.sumCom,0)
  ]);
  const ws3 = XLSX.utils.aoa_to_sheet(catRows2);
  ws3['!cols'] = [20,12,16,16].map(w => ({ wch: w }));
  XLSX.utils.book_append_sheet(wb, ws3, 'Por categoría');

  const doctor = config.doctor ? '_' + config.doctor.replace(/\s+/g,'_') : '';
  const suffix = mf ? '_' + mf : '_todos';
  XLSX.writeFile(wb, `Comisiones${doctor}${suffix}.xlsx`);
  showToast('📥 Excel descargado');
}
